<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multi-Armed Bandit Task</title>

  <!-- jsPsych 7 -->
  <script src="https://unpkg.com/jspsych@7.3.4/jspsych.js"></script>
  <link  href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" />

  <!-- DataPipe plugin (sends data to OSF via pipe.jspsych.org) -->
  <script src="https://unpkg.com/@jspsych-contrib/plugin-pipe@0.4"></script>

  <style>
    /* ── Base ─────────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #404040;          /* matches PsychoPy grey (-0.5,-0.5,-0.5) */
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width:  100vw;
    }

    /* jsPsych resets */
    .jspsych-display-element { background: transparent !important; }
    .jspsych-content-wrapper  { width: 100% !important; max-width: none !important; }
    .jspsych-content           { width: 100% !important; max-width: none !important;
                                 padding: 0 !important; }

    /* ── Outer border (100 px inset on each side) ─────────────── */
    #task-container {
      position: fixed;
      top:    100px;
      left:   100px;
      right:  100px;
      bottom: 100px;
      border: 4px solid #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── HUD ──────────────────────────────────────────────────── */
    #hud {
      position: absolute;
      top: 10px; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }
    #hud span {
      font-size: 35px;
      color: #ccc;
      white-space: nowrap;
    }

    /* ── Deck area ────────────────────────────────────────────── */
    #deck-area {
      display: flex;
      gap: 65px;               /* CARD_SPACING * 100 = 65px */
      align-items: flex-start;
      margin-top: 30px;
    }

    .deck-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Card rectangle: 180 × 240 px */
    .card {
      width:  180px;
      height: 240px;
      border: 3px solid #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      position: relative;
      transition: border-color 0.05s;
    }

    .card.selected {
      border: 6px solid #fff;
      outline: 6px solid #fff;
      outline-offset: 0px;
    }

    .card-label {
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      pointer-events: none;
    }

    /* Reward pop-up box (120 × 70 px, black fill, white border) */
    .reward-box {
      width:  120px;
      height:  70px;
      background: #000;
      border: 3px solid #fff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      font-size: 24px;
      font-weight: bold;
      color: #fff;
      visibility: hidden;
    }

    /* Stats text below each card */
    .deck-stats {
      margin-top: 8px;
      font-size: 22px;
      color: #e6e6e6;
      text-align: center;
    }

    /* ── Bottom instruction bar ───────────────────────────────── */
    #instructions-bar {
      position: absolute;
      bottom: 20px;
      left: 0; right: 0;
      text-align: center;
      font-size: 35px;
      color: #ccc;
    }

    /* ── Instruction / break screens ─────────────────────────── */
    .text-screen {
      position: fixed;
      top: 100px; left: 100px; right: 100px; bottom: 100px;
      border: 4px solid #000;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 50px;
      color: #fff;
      font-size: 35px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .text-screen.centered {
      align-items: center;
      text-align: center;
    }

    /* ── Countdown (break screen) ─────────────────────────────── */
    #countdown-text {
      font-size: 30px;
      color: #ffff33;
      font-weight: bold;
      margin-top: 30px;
    }

    #break-info {
      font-size: 30px;
      color: #fff;
      text-align: center;
    }
  </style>
</head>

// =============================================================================
// STATE
// =============================================================================
let participantInfo = {};
let trialData       = [];   // all rows (practice + main)

// Running state shared across trials
let totalScore      = 0;
let previousChoice  = null;
let previousReward  = null;
let deckChoiceCounts= [0,0,0,0];
// WSLS counters
let wsls = { win_stay:0, win_shift:0, lose_stay:0, lose_shift:0 };

// =============================================================================
// HELPERS
// =============================================================================
function getTimestamp() {
  return new Date().toISOString().replace('T',' ').replace('Z','');
}

function calcWSLS(selectedArm) {
  let wsls_category = '';
  if (previousChoice !== null && previousReward !== null) {
    const prev_was_win = previousReward >= 50;
    const stayed       = selectedArm === previousChoice;
    if (prev_was_win && stayed)  { wsls.win_stay++;  wsls_category = 'win_stay';  }
    else if (prev_was_win)       { wsls.win_shift++; wsls_category = 'win_shift'; }
    else if (!prev_was_win && stayed) { wsls.lose_stay++; wsls_category = 'lose_stay'; }
    else                         { wsls.lose_shift++; wsls_category = 'lose_shift';}
  }
  return wsls_category;
}

// Build deck stats HTML string (choice count under each card)
function buildDeckStats() {
  return deckChoiceCounts.map(c => `Chosen: ${c}x`);
}

// =============================================================================
// BUILD TASK SCREEN HTML
// =============================================================================
function buildTaskHTML({
  trialLabel,      // e.g. "PRACTICE Trial: 1 / 10"
  remainingLabel,  // e.g. "Remaining: 149"  (null → omit)
  scoreLabel,      // e.g. "Total Score: 0"
  selectedArm,     // null (choice phase) or 0-3 (feedback phase)
  reward,          // null or number
  showRewardBox,   // boolean
  instructionText  // bottom bar text
}) {
  const stats = buildDeckStats();

  const deckHTML = CARD_NAMES.map((name, i) => {
    const isSelected = selectedArm === i;
    return `
      <div class="deck-wrapper" id="deck-wrapper-${i}">
        <div class="reward-box" id="reward-box-${i}"
             style="visibility:${(showRewardBox && isSelected) ? 'visible' : 'hidden'}">
          ${(showRewardBox && isSelected && reward !== null) ? '+' + reward : ''}
        </div>
        <div class="card${isSelected ? ' selected' : ''}"
             style="background:${CARD_COLORS[i]}">
          <span class="card-label">${name}</span>
        </div>
        <div class="deck-stats">${stats[i]}</div>
      </div>`;
  }).join('');

  const remainingHTML = remainingLabel
    ? `<span id="remaining-label">${remainingLabel}</span>` : '';

  return `
    <div id="task-container">
      <div id="hud">
        <span>${trialLabel}</span>
        <span>${scoreLabel}</span>
      </div>
      ${remainingHTML ? `<div style="position:absolute;top:55px;left:20px;font-size:35px;color:#ccc;">${remainingLabel}</div>` : ''}
      <div id="deck-area">${deckHTML}</div>
      <div id="instructions-bar">${instructionText}</div>
    </div>`;
}

// =============================================================================
// jsPsych INITIALISATION
// =============================================================================
const jsPsych = initJsPsych({
  on_finish: function() {
    // Show a blank screen while uploading
    document.body.innerHTML =
      '<div style="color:#fff;font-size:32px;text-align:center;margin-top:200px;">Saving your data, please wait…</div>';
  }
});

// =============================================================================
// TIMELINE NODES
// =============================================================================

// ── 1. Participant Info Form ─────────────────────────────────────────────────
const participantForm = {
  type: jsPsychSurveyHtmlForm,
  preamble: '<h2 style="color:#fff;font-size:32px;margin-bottom:20px;">Multi-Armed Bandit Task</h2>',

// ── 2. Instructions ──────────────────────────────────────────────────────────
const instructionsScreen = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="text-screen">
      <p>Welcome to the Card Strategy Task.</p>
      <br>
      <p>• In this task, you will see 4 decks of cards.</p>

      <br>

      <p>• Try to see which decks give you better rewards!</p>
      <br>

      <p>• Then you will complete 300 trials with a break provided in between.</p>

      <p style="color:#aaa;">Press <strong>SPACE</strong> to begin the practice trials.</p>
    </div>`,
  choices: [' '],
  response_ends_trial: true
};

// =============================================================================
// FACTORY: one trial (choice + feedback combined via on_load timing)
// =============================================================================
function makeTrial(overallIndex, trialType) {
  // Derived identifiers
  const isPractice   = trialType === 'practice';
  const trialNumber  = isPractice
    ? overallIndex + 1
    : overallIndex - N_PRACTICE_TRIALS + 1;
  const currentBlock = isPractice ? 0
    : Math.floor((overallIndex - N_PRACTICE_TRIALS) / TRIALS_PER_BLOCK) + 1;
  const trialInBlock = isPractice ? null
    : ((overallIndex - N_PRACTICE_TRIALS) % TRIALS_PER_BLOCK) + 1;
  const trialsRemaining = isPractice
    ? N_PRACTICE_TRIALS - (overallIndex + 1)
    : N_TRIALS - (overallIndex - N_PRACTICE_TRIALS + 1);

  function trialLabel() {
    if (isPractice)
      return `PRACTICE Trial: ${trialNumber} / ${N_PRACTICE_TRIALS}`;
    return `Trial: ${trialNumber} / ${N_TRIALS} | Block: ${currentBlock}`;
  }
  function scoreLabel() {
    return isPractice ? `Score: ${totalScore}` : `Total Score: ${totalScore}`;
  }
  function remainingLabel() {
    if (!isPractice) return `Remaining: ${trialsRemaining}`;
    return null;
  }

  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      return buildTaskHTML({
        trialLabel:      trialLabel(),
        remainingLabel:  remainingLabel(),
        scoreLabel:      scoreLabel(),
        selectedArm:     null,
        reward:          null,
        showRewardBox:   false,
        instructionText: 'Press 1, 2, 3, or 4 to select a deck'
      });
    },
    choices: ['1','2','3','4'],
    response_ends_trial: false,   // we control ending manually
    on_load: function() {
      const startTime = performance.now();

      function handleKey(e) {
        const key = e.key;
        if (!['1','2','3','4'].includes(key)) return;

        const rt          = performance.now() - startTime;
        const selectedArm = parseInt(key) - 1;  // 0-indexed
        const reward      = ALL_REWARDS[overallIndex][selectedArm];

        // Update running totals
        totalScore += reward;
        deckChoiceCounts[selectedArm]++;

        const switched = (previousChoice !== null && previousChoice !== selectedArm) ? 1 : 0;
        const wsls_category = calcWSLS(selectedArm);

        // Record data row
        trialData.push({
          participant:      participantInfo.participant || '',
          session:          participantInfo.session || '001',
          age:              participantInfo.age || '',
          gender:           participantInfo.gender || '',
          trial_type:       trialType,
          trial_number:     trialNumber,
          overall_trial:    overallIndex + 1,
          block:            currentBlock,
          trial_in_block:   trialInBlock !== null ? trialInBlock : '',
          trials_remaining: trialsRemaining,
          selected_arm:     selectedArm + 1,  // 1-indexed to match Python
          reward:           reward,
          cumulative_score: totalScore,
          reaction_time:    (rt / 1000).toFixed(4),  // seconds, 4 d.p.
          switched:         switched,
          wsls_category:    wsls_category,
          timestamp:        getTimestamp()
        });

        // Update state for next trial
        previousChoice = selectedArm;
        previousReward = reward;

        // Remove listener before re-rendering
        document.removeEventListener('keydown', handleKey);

        // Show feedback (highlight + reward box) for REWARD_DISPLAY_TIME ms
        const content = document.querySelector('.jspsych-content');
        if (content) {
          content.innerHTML = buildTaskHTML({
            trialLabel:      trialLabel(),
            remainingLabel:  remainingLabel(),
            scoreLabel:      scoreLabel(),
            selectedArm:     selectedArm,
            reward:          reward,
            showRewardBox:   true,
            instructionText: 'Press 1, 2, 3, or 4 to select a deck'
          });
        }

        setTimeout(function() {
          jsPsych.finishTrial({ response: key, rt: rt });
        }, REWARD_DISPLAY_TIME);
      }

      document.addEventListener('keydown', handleKey);
    }
  };
}

// =============================================================================
// PRACTICE → MAIN TRANSITION SCREEN
// =============================================================================
const practiceEndScreen = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: `
    <div class="text-screen">
      <p>Practice Complete!</p>
      <br>
      <p>• You've finished the practice trials.</p>
      <p>• Now you will begin the main task with 300 trials.</p>
      <br>
      <p><strong>Remember:</strong></p>
      <p>• Try to earn as many points as possible.</p>
      <p>• Some decks are better than others on average.</p>
      <p>• There will be a break halfway through.</p>
      <br>
      <p style="color:#aaa;">Press <strong>SPACE</strong> when you're ready to begin.</p>
    </div>`,
  choices: [' '],
  on_start: function() {
    // Reset score for main task (deck stats carry over as in original)
    totalScore = 0;
  }
};

// =============================================================================
// BREAK SCREEN  (120-second countdown, early exit with SPACE)
// =============================================================================
function makeBreakScreen(blockNum, scoreAtBreak) {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: `
      <div id="task-container">
        <div class="text-screen centered" style="position:static;border:none;">
          <div id="break-info">
            Break Time!<br><br>
            You've completed Block ${blockNum} of ${N_BLOCKS}.<br><br>
            Your current total score: <strong>${Math.round(scoreAtBreak)}</strong> points<br><br>
            Take a break and relax.
          </div>
          <div id="countdown-text">Time remaining: 2:00</div>
          <br>
          <div style="font-size:26px;color:#aaa;">(Press SPACE to continue early)</div>
        </div>
      </div>`,
    choices: [' '],
    response_ends_trial: false,
    on_load: function() {
      const endTime = Date.now() + BREAK_DURATION_MS;

      function tick() {
        const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
        const mins = Math.floor(remaining / 60);
        const secs = remaining % 60;
        const cdEl = document.getElementById('countdown-text');
        if (cdEl) {
          cdEl.textContent = `Time remaining: ${mins}:${secs.toString().padStart(2,'0')}`;
          cdEl.style.color = remaining <= 10 ? '#ff4d4d' : '#ffff33';
        }
        if (remaining > 0) {
          setTimeout(tick, 100);
        } else {
          // Auto-advance when timer expires
          showReadyAndFinish();
        }
      }

      // SPACE key handler for early exit
      function onSpace(e) {
        if (e.key === ' ') {
          document.removeEventListener('keydown', onSpace);
          showReadyAndFinish();
        }
      }
      document.addEventListener('keydown', onSpace);
      tick();

      function showReadyAndFinish() {
        document.removeEventListener('keydown', onSpace);
        const container = document.getElementById('task-container');
        if (container) {
          container.innerHTML = `
            <div class="text-screen centered" style="position:static;border:none;">
              <div style="font-size:30px;color:#fff;">
                Break complete!<br><br>Press <strong>SPACE</strong> to continue.
              </div>
            </div>`;
        }
        const onSpaceReady = (e) => {
          if (e.key === ' ') {
            document.removeEventListener('keydown', onSpaceReady);
            jsPsych.finishTrial({});
          }
        };
        document.addEventListener('keydown', onSpaceReady);
      }
    }
  };
}

// =============================================================================
// END SCREEN
// =============================================================================
const endScreen = {
  type: jsPsychHtmlKeyboardResponse,
  stimulus: function() {
    return `
      <div class="text-screen centered">
        <p style="font-size:36px;">Task Complete!</p>
        <br>
        <p>Your total score: <strong>${Math.round(totalScore)}</strong> points</p>
        <br>
        <p>Thank you for participating!</p>
        <br>
        <p style="color:#aaa;font-size:28px;">Press <strong>SPACE</strong> to finish.</p>
      </div>`;
  },
  choices: [' ']
};

// =============================================================================
// DATA UPLOAD TO OSF VIA DATAPIPE
// =============================================================================
const saveData = {
  type: jsPsychPipe,
  action:        'save',
  experiment_id: DATAPIPE_EXPERIMENT_ID,
  filename: function() {
    const pid = participantInfo.participant || 'unknown';
    const ts  = new Date().toISOString().replace(/[:.]/g,'-');
    return `bandit_${pid}_${ts}.csv`;
  },
  data_string: function() {
    // Serialise trialData array to CSV
    if (trialData.length === 0) return '';
    const headers = Object.keys(trialData[0]);
    const rows    = trialData.map(row =>
      headers.map(h => {
        const v = row[h];
        // Wrap in quotes if value contains comma or quote
        if (typeof v === 'string' && (v.includes(',') || v.includes('"')))
          return `"${v.replace(/"/g,'""')}"`;
        return v;
      }).join(',')
    );
    return [headers.join(','), ...rows].join('\n');
  }
};

// =============================================================================
// ASSEMBLE FULL TIMELINE
// =============================================================================
const timeline = [];

// Participant info + instructions
timeline.push(participantForm);
timeline.push(instructionsScreen);

// Practice block (trials 0-9)
for (let i = 0; i < N_PRACTICE_TRIALS; i++) {
  timeline.push(makeTrial(i, 'practice'));
}

// Practice → main transition
timeline.push(practiceEndScreen);

// Main blocks
for (let trial = 0; trial < N_TRIALS; trial++) {
  const overallIndex = N_PRACTICE_TRIALS + trial;

  // Insert break screen between blocks (after trial 149, before trial 150)
  if (trial > 0 && trial % TRIALS_PER_BLOCK === 0) {
    const blockJustFinished = Math.floor(trial / TRIALS_PER_BLOCK);
    // Use a closure to capture current score at the time the break node runs
    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        return `<div class="text-container"></div>`;  // placeholder
      },
      choices: jsPsych.NO_KEYS,
      trial_duration: 1,
      on_finish: function() {
        // Insert the break screen dynamically with current score
        // (We use a simpler approach: record score, let the next node read it)
      }
    });
    // The break screen reads totalScore at render time via stimulus function
    timeline.push(makeBreakScreen(blockJustFinished, 0));
    // Patch: override the break screen stimulus to use live score
    // Since makeBreakScreen captures scoreAtBreak at call time (0),
    // we instead build it as a closure that reads totalScore at runtime:
    // Remove the last push and replace with a live version
    timeline.pop();   // remove the static break
    timeline.pop();   // remove the placeholder
    timeline.push({
      type: jsPsychHtmlKeyboardResponse,
      stimulus: function() {
        return `
          <div id="task-container">
            <div class="text-screen centered" style="position:static;border:none;">
              <div id="break-info">
                Break Time!<br><br>
                You've completed Block ${blockJustFinished} of ${N_BLOCKS}.<br><br>
                Your current total score: <strong>${totalScore}</strong> points<br><br>
                Take a break and relax.
              </div>
              <div id="countdown-text">Time remaining: 2:00</div>
              <br>
              <div style="font-size:26px;color:#aaa;">(Press SPACE to continue early)</div>
            </div>
          </div>`;
      },
      choices: [' '],
      response_ends_trial: false,
      on_load: function() {
        const endTime = Date.now() + BREAK_DURATION_MS;

        function tick() {
          const remaining = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
          const mins = Math.floor(remaining / 60);
          const secs = remaining % 60;
          const cdEl = document.getElementById('countdown-text');
          if (cdEl) {
            cdEl.textContent = `Time remaining: ${mins}:${secs.toString().padStart(2,'0')}`;
            cdEl.style.color = remaining <= 10 ? '#ff4d4d' : '#ffff33';
          }
          if (remaining > 0) { setTimeout(tick, 100); }
          else { showReadyAndFinish(); }
        }

        const onSpaceEarly = (e) => {
          if (e.key === ' ') {
            document.removeEventListener('keydown', onSpaceEarly);
            showReadyAndFinish();
          }
        };
        document.addEventListener('keydown', onSpaceEarly);
        tick();

        function showReadyAndFinish() {
          document.removeEventListener('keydown', onSpaceEarly);
          const container = document.getElementById('task-container');
          if (container) {
            container.innerHTML = `
              <div class="text-screen centered" style="position:static;border:none;">
                <div style="font-size:30px;color:#fff;">
                  Break complete!<br><br>Press <strong>SPACE</strong> to continue.
                </div>
              </div>`;
          }
          const onSpaceReady = (e) => {
            if (e.key === ' ') {
              document.removeEventListener('keydown', onSpaceReady);
              jsPsych.finishTrial({});
            }
          };
          document.addEventListener('keydown', onSpaceReady);
        }
      }
    });
  }

  timeline.push(makeTrial(overallIndex, 'main'));
}

// End screen + data upload
timeline.push(endScreen);
timeline.push(saveData);

// =============================================================================
// RUN
// =============================================================================
jsPsych.run(timeline);
</script>
