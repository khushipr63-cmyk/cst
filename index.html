<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multi-Armed Bandit Task</title>

  <!-- ── Load ALL jsPsych scripts first, before any experiment code ── -->
 <script src="js/jspsych.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #808080;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    .jspsych-display-element { background: transparent !important; }
    .jspsych-content-wrapper  { width: 100% !important; max-width: none !important; }
    .jspsych-content          { width: 100% !important; max-width: none !important; padding: 0 !important; }

    #task-container {
      position: fixed;
      top: 50px; left: 50px; right: 50px; bottom: 50px;
      border: 4px solid #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #hud {
      position: absolute;
      top: 10px; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
    }
    #hud span { font-size: 22px; color: #000; white-space: nowrap; }

    #deck-area {
      display: flex;
      gap: 65px;
      align-items: flex-start;
      margin-top: 30px;
    }

    .deck-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .card {
      width: 180px; height: 240px;
      border: 3px solid #fff;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      position: relative;
    }

    .card.selected {
      border: 6px solid #fff;
      outline: 6px solid #fff;
      outline-offset: 0px;
    }

    .card-label {
      font-size: 22px;
      font-weight: bold;
      color: #000;
      pointer-events: none;
    }

    .reward-box {
      width: 120px; height: 70px;
      background: #000;
      border: 3px solid #fff;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
      font-size: 22px;
      font-weight: bold;
      color: #fff;
      visibility: hidden;
    }

    .deck-stats {
      margin-top: 8px;
      font-size: 22px;
      color: #000;
      text-align: center;
    }

    #instructions-bar {
      position: absolute;
      bottom: 20px; left: 0; right: 0;
      text-align: center;
      font-size: 22px;
      color: #000;
    }

    .text-screen {
      position: fixed;
      top: 50px; left: 50px; right: 50px; bottom: 50px;
      border: 4px solid #000;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 50px;
      color: #000;
      font-size: 22px;
      line-height: 1.3;
    }

    .text-screen.centered {
      align-items: center;
      text-align: center;
    }

    #countdown-text {
      font-size: 22px;
      color: #ffff33;
      font-weight: bold;
      margin-top: 30px;
    }

    /* Consent form styles */
    .consent-wrapper {
      position: fixed;
      top: 50px; left: 50px; right: 50px; bottom: 50px;
      border: 4px solid #000;
      background: #808080;
      overflow-y: auto;
      padding: 40px 50px;
      box-sizing: border-box;
    }

    .consent-wrapper h1 {
      font-size: 24px;
      font-weight: bold;
      color: #000;
      margin-bottom: 18px;
      text-align: center;
    }

    .consent-wrapper h2 {
      font-size: 20px;
      font-weight: bold;
      color: #000;
      margin: 18px 0 6px 0;
    }

    .consent-wrapper p, .consent-wrapper li {
      font-size: 18px;
      color: #000;
      line-height: 1.5;
      margin-bottom: 6px;
    }

    .consent-wrapper ul {
      margin: 6px 0 6px 28px;
    }

    .consent-checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 10px 0;
    }

    .consent-checkbox-row input[type="checkbox"] {
      width: 22px;
      height: 22px;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .consent-checkbox-row label {
      font-size: 18px;
      color: #000;
      line-height: 1.5;
      cursor: pointer;
    }

    .consent-agree-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 20px 0 10px 0;
      padding: 14px;
      border: 2px solid #000;
      background: rgba(0,0,0,0.08);
      border-radius: 4px;
    }

    .consent-agree-row input[type="checkbox"] {
      width: 24px;
      height: 24px;
      margin-top: 2px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .consent-agree-row label {
      font-size: 19px;
      font-weight: bold;
      color: #000;
      line-height: 1.5;
      cursor: pointer;
    }

    #consent-submit-btn {
      display: block;
      margin: 16px auto 0 auto;
      padding: 12px 40px;
      font-size: 20px;
      font-weight: bold;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    #consent-submit-btn:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #consent-error-msg {
      color: #cc0000;
      font-size: 18px;
      text-align: center;
      margin-top: 8px;
      min-height: 24px;
    }
  </style>
</head>

,37,44],[73,56,27,46],[72,48,27,47],[69,58,30,54],[74,65,34,51],[70,66,35,55],[75,55,46,54],[72,61,49,52],[72,59,49,56],[70,61,39,48],[79,63,40,56],[69,59,50,53],[69,60,52,54],[59,59,52,62],[61,62,53,55],[63,60,62,51],[59,67,53,57],[63,61,52,50],[64,64,51,49],[50,56,43,44],[49,60,58,47],[51,57,55,50],[56,53,58,56],[57,57,56,60],[69,61,70,55],[60,49,65,54]];

// =============================================================================
// STATE
// =============================================================================
let participantInfo  = {};
let trialData        = [];
let totalScore       = 0;
let previousChoice   = null;
let previousReward   = null;
let deckChoiceCounts = [0, 0, 0, 0];
let wsls = { win_stay:0, win_shift:0, lose_stay:0, lose_shift:0 };

// =============================================================================
// HELPERS
// =============================================================================
function getTimestamp() {
  return new Date().toISOString().replace('T', ' ').replace('Z', '');
}

function calcWSLS(selectedArm) {
  let cat = '';
  if (previousChoice !== null && previousReward !== null) {
    const win    = previousReward >= 50;
    const stayed = selectedArm === previousChoice;
    if (win  && stayed)  { wsls.win_stay++;   cat = 'win_stay';   }
    else if (win)        { wsls.win_shift++;  cat = 'win_shift';  }
    else if (stayed)     { wsls.lose_stay++;  cat = 'lose_stay';  }
    else                 { wsls.lose_shift++; cat = 'lose_shift'; }
  }
  return cat;
}

function buildTaskHTML({ trialLabel, remainingLabel, scoreLabel,
                         selectedArm, reward, showRewardBox, instructionText }) {
  const stats = deckChoiceCounts.map(c => `Chosen: ${c}x`);
  const decks = CARD_NAMES.map((name, i) => {
    const sel = selectedArm === i;
    return `
      <div class="deck-wrapper">
        <div class="reward-box" style="visibility:${showRewardBox && sel ? 'visible' : 'hidden'}">
          ${showRewardBox && sel && reward !== null ? '+' + reward : ''}
        </div>
        <div class="card${sel ? ' selected' : ''}" style="background:${CARD_COLORS[i]}">
          <span class="card-label">${name}</span>
        </div>
        <div class="deck-stats">${stats[i]}</div>
      </div>`;
  }).join('');

  const remHTML = remainingLabel
    ? `<div style="position:absolute;top:55px;left:20px;font-size:22px;color:#000;">${remainingLabel}</div>`
    : '';

  return `
    <div id="task-container">
      <div id="hud">
        <span>${trialLabel}</span>
        <span>${scoreLabel}</span>
      </div>
      ${remHTML}
      <div id="deck-area">${decks}</div>
      <div id="instructions-bar">${instructionText}</div>
    </div>`;
}

// =============================================================================
// jsPsych INIT
// =============================================================================
const jsPsych = initJsPsych({
  on_finish: function() {

    // Build CSV
    function buildCSV() {
      if (trialData.length === 0) return '';
      const headers = Object.keys(trialData[0]);
      const rows = trialData.map(row =>
        headers.map(h => {
          const v = row[h];
          if (typeof v === 'string' && (v.includes(',') || v.includes('"')))
            return `"${v.replace(/"/g, '""')}"`;
          return v;
        }).join(',')
      );
      return [headers.join(','), ...rows].join('\n');
    }

    // Show waiting screen
    document.body.innerHTML = `
      <div id="save-msg" style="color:#000;font-size:22px;text-align:center;margin-top:200px;line-height:2;">
        <p style="font-size:22px;font-weight:bold;margin-bottom:16px;">Task Complete!</p>
        <p style="font-size:22px;margin-bottom:16px;">Your final score is: <strong>${Math.round(totalScore)}</strong> points</p>
        <p style="font-size:22px;">Saving your data, please wait…</p>
      </div>`;

    // Upload directly via fetch
    const pid      = participantInfo.participant || 'unknown';
    const ts       = new Date().toISOString().replace(/[:.]/g, '-');
    const filename = `bandit_${pid}_${ts}.csv`;

    fetch('https://pipe.jspsych.org/api/data/', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': '*/*' },
      body: JSON.stringify({
        experimentID: DATAPIPE_EXPERIMENT_ID,
        filename:     filename,
        data:         buildCSV(),
      })
    })
    .then(r => r.json())
    .then(() => {
      const el = document.getElementById('save-msg');
      if (el) {
        el.innerHTML = `
          <p style="font-size:22px;font-weight:bold;margin-bottom:16px;">Task Complete!</p>
          <p style="font-size:22px;margin-bottom:16px;">Your final score is: <strong>${Math.round(totalScore)}</strong> points</p>
          <p style="font-size:22px;color:#007700;">Data saved successfully. You may now close this tab. Thank you for participating!</p>`;
      }
    })
    .catch(() => {
      const el = document.getElementById('save-msg');
      if (el) {
        el.innerHTML = `
          <p style="font-size:22px;font-weight:bold;margin-bottom:16px;">Task Complete!</p>
          <p style="font-size:22px;margin-bottom:16px;">Your final score is: <strong>${Math.round(totalScore)}</strong> points</p>
          <p style="font-size:22px;color:#cc0000;">Data saving failed. Please take a screenshot of this page and contact the researcher.</p>`;
      }
    });

  }
});

// =============================================================================
// TRIAL FACTORY
// =============================================================================
function makeTrial(overallIndex, trialType) {
  const isPractice     = trialType === 'practice';
  const trialNumber    = isPractice ? overallIndex + 1 : overallIndex - N_PRACTICE_TRIALS + 1;
  const currentBlock   = isPractice ? 0 : Math.floor((overallIndex - N_PRACTICE_TRIALS) / TRIALS_PER_BLOCK) + 1;
  const trialInBlock   = isPractice ? '' : ((overallIndex - N_PRACTICE_TRIALS) % TRIALS_PER_BLOCK) + 1;
  const trialsRemain   = isPractice
    ? N_PRACTICE_TRIALS - (overallIndex + 1)
    : N_TRIALS - (overallIndex - N_PRACTICE_TRIALS + 1);

  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      const label = isPractice
        ? `PRACTICE Trial: ${trialNumber} / ${N_PRACTICE_TRIALS}`
        : `Trial: ${trialNumber} / ${N_TRIALS} | Block: ${currentBlock}`;
      const score = isPractice ? `Score: ${totalScore}` : `Total Score: ${totalScore}`;
      const rem   = isPractice ? null : `Remaining: ${trialsRemain}`;
      return buildTaskHTML({
        trialLabel: label, remainingLabel: rem, scoreLabel: score,
        selectedArm: null, reward: null, showRewardBox: false,
        instructionText: 'Press 1, 2, 3, or 4 to select a deck'
      });
    },
    choices: ['1','2','3','4'],
    response_ends_trial: false,
    on_load: function() {
      const startTime = performance.now();

      function handleKey(e) {
        if (!['1','2','3','4'].includes(e.key)) return;
        document.removeEventListener('keydown', handleKey);

        const rt          = performance.now() - startTime;
        const arm         = parseInt(e.key) - 1;
        const reward      = ALL_REWARDS[overallIndex][arm];

        totalScore += reward;
        deckChoiceCounts[arm]++;

        const switched      = (previousChoice !== null && previousChoice !== arm) ? 1 : 0;
        const wsls_category = calcWSLS(arm);

        trialData.push({
          participant:      participantInfo.participant || '',
          session:          participantInfo.session     || '001',
          trial_type:       trialType,
          trial_number:     trialNumber,
          overall_trial:    overallIndex + 1,
          block:            currentBlock,
          trial_in_block:   trialInBlock,
          trials_remaining: trialsRemain,
          selected_arm:     arm + 1,
          reward:           reward,
          cumulative_score: totalScore,
          reaction_time:    (rt / 1000).toFixed(4),
          switched:         switched,
          wsls_category:    wsls_category,
          timestamp:        getTimestamp()
        });

        previousChoice = arm;
        previousReward = reward;

        // Show feedback screen
        const label = isPractice
          ? `PRACTICE Trial: ${trialNumber} / ${N_PRACTICE_TRIALS}`
          : `Trial: ${trialNumber} / ${N_TRIALS} | Block: ${currentBlock}`;
        const score = isPractice ? `Score: ${totalScore}` : `Total Score: ${totalScore}`;
        const rem   = isPractice ? null : `Remaining: ${trialsRemain}`;

        const content = document.querySelector('.jspsych-content');
        if (content) {
          content.innerHTML = buildTaskHTML({
            trialLabel: label, remainingLabel: rem, scoreLabel: score,
            selectedArm: arm, reward: reward, showRewardBox: true,
            instructionText: 'Press 1, 2, 3, or 4 to select a deck'
          });
        }

        setTimeout(() => jsPsych.finishTrial({ response: e.key, rt }), REWARD_DISPLAY_MS);
      }

      document.addEventListener('keydown', handleKey);
    }
  };
}

// BREAK SCREEN FACTORY
// =============================================================================
function makeBreakScreen() {
  return {
    type: jsPsychHtmlKeyboardResponse,
    stimulus: function() {
      return `
        <div id="task-container">
          <div class="text-screen centered" style="position:static;border:none;">
            <div style="font-size:22px;color:#000;text-align:center;">
              Break Time!<br><br>
              You've completed Block 1 of ${N_BLOCKS}.<br><br>
              Your current total score: <strong>${totalScore}</strong> points<br><br>
              Take a break and relax.
            </div>
            <div id="countdown-text">Time remaining: 2:00</div>
            <br>
            <div style="font-size:22px;color:#000;">(Press SPACE to continue early)</div>
          </div>
        </div>`;
    },
    choices: [' '],
    response_ends_trial: false,
    on_load: function() {
      const endTime = Date.now() + BREAK_DURATION_MS;

      function tick() {
        const rem  = Math.max(0, Math.ceil((endTime - Date.now()) / 1000));
        const mins = Math.floor(rem / 60);
        const secs = rem % 60;
        const el   = document.getElementById('countdown-text');
        if (el) {
          el.textContent = `Time remaining: ${mins}:${secs.toString().padStart(2,'0')}`;
          el.style.color = rem <= 10 ? '#ff4d4d' : '#ffff33';
        }
        if (rem > 0) { setTimeout(tick, 100); }
        else { showReady(); }
      }

      function showReady() {
        document.removeEventListener('keydown', onSpace);
        const c = document.getElementById('task-container');
        if (c) {
          c.innerHTML = `
            <div style="font-size:22px;color:#000;text-align:center;">
              Break complete!<br><br>Press <strong>SPACE</strong> to continue.
            </div>`;
        }
        document.addEventListener('keydown', function onReady(e) {
          if (e.key === ' ') {
            document.removeEventListener('keydown', onReady);
            jsPsych.finishTrial({});
          }
        });
      }

      function onSpace(e) {
        if (e.key === ' ') { showReady(); }
      }
      document.addEventListener('keydown', onSpace);
      tick();
    }
  };
}

    const pid = participantInfo.participant || 'unknown';
    const ts  = new Date().toISOString().replace(/[:.]/g, '-');

    // Each row is: field,value — data runs vertically down column A (field) and column B (value)
    const consentRows = [
      ['field', 'value'],
      ['participant_id', pid],
      ['session', participantInfo.session || '001'],
      ['consent_timestamp', consentData.timestamp],
      ['study_title', 'Adaptive Decision-Making Among Those with Substance and Non-Substance Use Behaviours'],

    ];
    const consentCSV = consentRows.map(([f, v]) => {
      const safeV = String(v).includes(',') ? `"${String(v).replace(/"/g, '""')}"` : v;

    }).join('\n');

    fetch('https://pipe.jspsych.org/api/data/', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': '*/*' },
